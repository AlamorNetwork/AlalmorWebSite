[build]
  command = "npm run build"
  publish = "public"

# هدایت ترافیک مسیرهای خاص به فایل relay.js
[[edge_functions]]
  path = "/api/v1/*"
  function = "relay"

[[edge_functions]]
  path = "/data/*"
  function = "relay"

[[edge_functions]]
  path = "/service/*"
  function = "relay"

# تنظیم هدرهای سراسری برای شبیه‌سازی یک سایت واقعی و مخفی کردن هویت
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"
    Server = "cloudflare"
