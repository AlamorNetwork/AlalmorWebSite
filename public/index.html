<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus Server | System Status</title>
    <style>
        body, html {
            margin: 0; padding: 0; height: 100%;
            background-color: #09090b; color: #f4f4f5;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            overflow: hidden; display: flex;
            align-items: center; justify-content: center;
        }
        .bg-glow {
            position: absolute; width: 600px; height: 600px;
            background: radial-gradient(circle, rgba(56, 189, 248, 0.08) 0%, rgba(9, 9, 11, 0) 70%);
            top: 50%; left: 50%; transform: translate(-50%, -50%);
            z-index: 0; pointer-events: none;
        }
        .container {
            position: relative; z-index: 10; text-align: center;
            padding: 50px 60px; border-radius: 24px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }
        h1 {
            font-size: 2.5rem; margin: 0 0 8px; font-weight: 700;
            background: linear-gradient(to right, #38bdf8, #818cf8);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            letter-spacing: -0.05em;
        }
        p {
            font-size: 1.1rem; color: #a1a1aa; margin: 0 0 32px; font-weight: 400;
        }
        .status-badge {
            display: inline-flex; align-items: center; gap: 10px;
            padding: 8px 20px; border-radius: 999px;
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid rgba(16, 185, 129, 0.2);
            color: #34d399; font-size: 0.9rem; font-weight: 500;
            letter-spacing: 0.05em; text-transform: uppercase;
        }
        .pulse-dot {
            width: 8px; height: 8px; background-color: #10b981;
            border-radius: 50%; box-shadow: 0 0 12px #10b981;
            animation: pulse 2s infinite cubic-bezier(0.4, 0, 0.6, 1);
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.4; transform: scale(0.8); }
        }
    </style>
</head>
<body>
    <div class="bg-glow"></div>
    <div class="container">
        <h1>Nexus Edge API</h1>
        <p>Enterprise Global Routing Network</p>
        <div class="status-badge">
            <div class="pulse-dot"></div>
            All Systems Operational
        </div>
    </div>
</body>
</html>
